<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes activos</title>
</head>
<body>
    <h1>Listado de clientes activos</h1>
    <ul>
        {% for cliente in clientes %}
        <li><a href="/clientes/{{cliente.id}}">{{cliente.nombre}}</a> - {{cliente.email}}</li>
        {% empty %}
        <p>No hay clientes activos</p>
        {% endfor %}
    </ul>
</body>
</html>
